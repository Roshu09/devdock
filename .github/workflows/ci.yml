name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Verify CLI structure
        run: |
          test -f packages/cli/src/index.js && echo "✓ CLI entry point"
          for cmd in init up down status doctor switch list logs onboard; do
            test -f packages/cli/src/commands/$cmd.js && echo "✓ $cmd"
          done
